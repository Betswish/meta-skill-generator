      <path d="M306 216H313V223" stroke="#FFFDF8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="330" y="230" fill="#10314F" font-size="22" font-weight="700" font-family="Avenir Next, Trebuchet MS, Arial, sans-serif">OUTPUTS</text>
