    <text x="0" y="430" fill="#E97512" font-size="86" font-weight="800" font-family="Avenir Next, Trebuchet MS, Arial, sans-serif" letter-spacing="-2">Generator</text>
    <text x="4" y="496" fill="#173A59" font-size="28" font-weight="500" font-family="Avenir Next, Trebuchet MS, Arial, sans-serif" letter-spacing="-0.15">shape rough ideas into reusable SKILL.md workflows</text>
