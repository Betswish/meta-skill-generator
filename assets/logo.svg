    <rect x="88" y="18" width="76" height="10" rx="5" transform="rotate(-8 88 18)" fill="#10314F" fill-opacity="0.18"/>
    <rect x="88" y="42" width="124" height="10" rx="5" transform="rotate(-8 88 42)" fill="#10314F" fill-opacity="0.14"/>
    <rect x="88" y="66" width="92" height="10" rx="5" transform="rotate(-8 88 66)" fill="#10314F" fill-opacity="0.14"/>
    <rect x="254" y="10" width="150" height="90" rx="16" fill="#F7EFE2" stroke="#10314F" stroke-width="4"/>
    <path d="M280 70H308V42" stroke="#EA7A19" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M280 42L308 70" stroke="#EA7A19" stroke-width="8" stroke-linecap="round"/>
    <path d="M328 36H376" stroke="#10314F" stroke-width="8" stroke-linecap="round" opacity="0.22"/>
    <path d="M328 56H386" stroke="#10314F" stroke-width="8" stroke-linecap="round" opacity="0.18"/>
    <path d="M328 76H360" stroke="#10314F" stroke-width="8" stroke-linecap="round" opacity="0.18"/>
