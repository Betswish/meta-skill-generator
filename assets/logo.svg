<svg width="1600" height="720" viewBox="0 0 1600 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Meta Skill Generator</title>
  <desc id="desc">An original editorial-style banner showing a skill blueprint board, modular cards, and a wordmark for Meta Skill Generator.</desc>

  <defs>
    <radialGradient id="peachGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(280 186) rotate(90) scale(210 210)">
      <stop offset="0" stop-color="#F9C89D" stop-opacity="0.78"/>
      <stop offset="1" stop-color="#F9C89D" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="paper" x1="150" y1="102" x2="523" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFDF9"/>
      <stop offset="1" stop-color="#F5F6F8"/>
    </linearGradient>
    <linearGradient id="chipA" x1="110" y1="110" x2="278" y2="172" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D9F3E9"/>
      <stop offset="1" stop-color="#BFE8D9"/>
    </linearGradient>
    <linearGradient id="chipB" x1="298" y1="112" x2="470" y2="174" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF4DD"/>
      <stop offset="1" stop-color="#FCE5B3"/>
    </linearGradient>
    <linearGradient id="chipC" x1="110" y1="212" x2="282" y2="274" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#DCEBFB"/>
      <stop offset="1" stop-color="#C7DCF6"/>
