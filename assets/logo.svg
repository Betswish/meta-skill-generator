    <path d="M176 157C176 172 176 180 176 192" stroke="#10314F" stroke-width="4" stroke-linecap="round" stroke-dasharray="7 10"/>
    <path d="M368 157C368 172 368 180 368 192" stroke="#EA7A19" stroke-width="4" stroke-linecap="round" stroke-dasharray="7 10"/>
