    <rect x="336" y="526" width="84" height="18" rx="9" fill="#6CB6FF"/>
    <rect x="434" y="526" width="132" height="18" rx="9" fill="#D9FF63"/>
    <rect x="580" y="526" width="70" height="18" rx="9" fill="#28554C"/>
